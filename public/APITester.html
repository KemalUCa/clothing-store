<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Tester</title>

<style>
  body { font-family: Arial; margin: 20px; }

  form { margin-bottom: 20px; padding: 15px; border:1px solid #ddd; border-radius:10px; }

  input, button { margin:5px; padding:5px; }

  pre { background:#222; color:#0f0; padding:10px; }
</style>
</head>

<body>

<h1>Clothing Store API Tester</h1>

<a href="/">Back to Store</a>

<h3>Create Product</h3>
<form id="createForm">
  <input type="number" id="storeId" placeholder="Store ID" required />
  <input type="text" id="storeName" placeholder="Store Name" required />
  <input type="number" id="productId" placeholder="Product ID" required />
  <input type="text" id="productName" placeholder="Product Name" required />
  <input type="number" id="price" placeholder="Price" required />
  <button type="submit">Create Product</button>
</form>

<h3>Get All Products</h3>
<button onclick="getAll()">Fetch All</button>

<h3>Get Product</h3>
<input type="number" id="getId" placeholder="Product ID" />
<button onclick="getOne()">Fetch Product</button>

<h3>Delete Product</h3>
<input type="number" id="deleteId" placeholder="Product ID" />
<button onclick="deleteProduct()">Delete Product</button>

<h3>Response</h3>
<pre id="output">{}</pre>

<script>
const output = document.getElementById("output");

function show(data) {
  output.textContent = JSON.stringify(data, null, 2);
}

document.getElementById("createForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    storeId: Number(storeId.value),
    storeName: storeName.value,
    productId: Number(productId.value),
    productName: productName.value,
    price: Number(price.value)
  };

  const res = await fetch("/products", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  show(await res.json());
});

async function getAll() {
  const res = await fetch("/products");
  show(await res.json());
}

async function getOne() {
  const res = await fetch(`/products/${getId.value}`);
  show(await res.json());
}

async function deleteProduct() {
  const res = await fetch(`/products/${deleteId.value}`, { method:"DELETE" });
  show(await res.json());
}
</script>

</body>
</html>
