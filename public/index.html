<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group 7 Store</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f0f4f8; color: #222; }
    h1 { text-align: center; color: #222; margin-bottom: 10px; }
    h3 { margin-top: 0; font-size: 22px; }

    .subtitle { text-align: center; color: #666; margin-bottom: 25px; }

    .stores-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .store-card {
      border-radius: 12px;
      padding: 18px;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .clothing { background: linear-gradient(135deg,#ff7e5f,#feb47b); }
    .electronics { background: linear-gradient(135deg,#43cea2,#185a9d); }
    .books { background: linear-gradient(135deg,#8360c3,#2ebf91); }

    .store-card ul { padding-left: 20px; margin: 0; }
  </style>
</head>

<body>

<h1>🛍️ Group 7 Store</h1>
<p class="subtitle">Integrating Clothing, Electronics, and Book Stores</p>

<button onclick="loadGroupStores()">Load Group 7 Products</button>

<div class="stores-container">

  <div class="store-card clothing">
    <h3>👕 Clothing Store (Kemal)</h3>
    <ul id="clothingList"></ul>
  </div>

  <div class="store-card electronics">
    <h3>💻 Electronics Store (Farha)</h3>
    <ul id="electronicsList"></ul>
  </div>

  <div class="store-card books">
    <h3>📚 Book Store (Ali)</h3>
    <ul id="booksList"></ul>
  </div>

</div>


<script>
function renderList(id, products) {
  const list = document.getElementById(id);
  list.innerHTML = "";

  products.forEach(p => {
    const li = document.createElement("li");
    li.textContent = `${p.productName} - $${p.price}`;
    list.appendChild(li);
  });
}

async function loadGroupStores() {
  const res = await fetch("/all-products");
  const data = await res.json();

  renderList("clothingList", data.filter(p => p.storeName?.toLowerCase().includes("clothing")));
  renderList("electronicsList", data.filter(p => p.storeName?.toLowerCase().includes("electronics")));
  renderList("booksList", data.filter(p => p.storeName?.toLowerCase().includes("book")));
}

loadGroupStores();
</script>

</body>
</html>
